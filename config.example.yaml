# 派網訊號機器人設定範本。
# 複製為 config.yaml 後修改。機密（API 金鑰）請放在 .env，不要寫在這裡。

# 執行模式：
#   paper = 紙上交易（不下真實單，只模擬與記錄）  <-- 強烈建議先用這個
#   live  = 實盤交易（會用真錢下單）
mode: paper

exchange:
  base_url: https://api.pionex.com
  market: spot          # 目前支援 spot；futures 之後擴充

trading:
  symbol: BTC_USDT      # 交易對，格式為 BASE_QUOTE
  order_type: MARKET    # MARKET 或 LIMIT
  quote_per_trade: 20   # 每次「買入」要花多少報價幣（USDT）
  # LIMIT 單才會用到：掛單價相對市價的偏移百分比（買單往下、賣單往上）
  limit_offset_pct: 0.1

risk:
  max_quote_per_trade: 50      # 單筆買入金額上限（USDT），超過拒絕
  max_position_base: 0.01      # 最多持有的基礎幣數量（BTC），超過不再買
  daily_loss_limit_quote: 50   # 當日已實現虧損達此值（USDT）即停止交易
  cooldown_seconds: 60         # 兩筆交易最短間隔，避免訊號連發
  allow_short: false           # 現貨不可做空；保留給未來合約
  # 停損/停利建議值（順勢策略：留停損當安全網、關掉停利讓獲利奔跑）
  # 真正最佳值請用真實資料跑：python main.py backtest-sweep
  stop_loss_pct: 0.05          # 停損：虧損達 5% 自動平倉（0 = 關閉）
  take_profit_pct: 0           # 停利：關閉，靠策略的死亡交叉出場（0 = 關閉）

  # --- 以止損決定倉位（訊號帶 stop_loss 時生效）---
  risk_per_trade_pct: 0.01     # 每筆風險 = 帳戶權益的 1%（訊號帶 risk_quote 優先）
  risk_quote_default: null     # 或固定每筆願虧金額（USDT）；與上面擇一
  paper_equity: 1000           # 紙上模式沒有真實餘額，用這個當權益基準
  max_trades_per_day: 3        # 每日新進場上限（不影響出場）；0 = 不限
  breakeven_after_tp: 1        # 第 N 段停利成交後把止損移到保本；0 = 關閉
  breakeven_offset_pct: 0.001  # 保本價 = 進場價 × (1 + 此值)，蓋過手續費
  fill_ambiguity: worst        # 同根 K 同觸 SL/TP → 以 SL 計（保守）
  news_calendar_path: data/news_calendar.yaml   # 消息封鎖日曆（見範本）
  news_close_positions: false  # 消息視窗只擋新進場，不動既有部位

strategy:
  # 可用策略：ma_cross / rsi / macd / bollinger
  name: ma_cross
  interval: 5M          # K 線週期：1M 5M 15M 30M 60M 4H 8H 12H 1D
  poll_seconds: 30      # 多久抓一次 K 線重新評估
  params:
    # --- ma_cross ---
    fast: 9             # 快線週期
    slow: 21            # 慢線週期
    trend_ma: 200       # 趨勢過濾：只在站上此長均線(多頭)才做多；0 = 關閉
    # --- rsi（換成 name: rsi 時使用）---
    # period: 14
    # oversold: 30
    # overbought: 70
    # --- macd（換成 name: macd 時使用）---
    # fast: 12
    # slow: 26
    # signal: 9
    # --- bollinger（換成 name: bollinger 時使用）---
    # period: 20
    # num_std: 2.0

  # --- ict2022 SMC 策略 (python main.py run-ict / ict-backtest) ---
  ict2022:
    htf_interval: "4H"        # 高階時框：決定多空偏向（結構 UP 才做多）
    trigger_interval: "15M"   # 觸發時框：sweep + MSS + 進場區域偵測
    entry_interval: "5M"      # 進場時框：限價單成交與逾期計數
    lookback_sweep_bars: 60   # 幾根 trigger K 內要出現過 sweep
    entry_price_mode: ce      # ce = 掛區域中點 | zone_edge = 掛區域上緣
    sl_buffer_pct: 0.001      # SL = min(sweep 收針, 區域下緣) × (1 − 此值)
    tp_allocation: [0.5, 0.3, 0.2]   # 各段停利比例（TP 不足 3 個時尾段吃剩餘）
    min_rr_tp1: 1.5           # TP1 報酬風險比低於此值就放棄 setup
    expiry_bars: 24           # 掛單幾根 entry K 未成交就撤
    killzone_filter: true     # 只在 smc.sessions 定義的時段內掛新單
    require_ote: false        # true = 進場區 CE 必須落在 OTE 帶（硬條件）
    sweep_sources: []         # 限定觸發 sweep 的池種，如 ["EQ"]；空 = 不限
    # ↑ 這兩個是 2026-07 回測留下的假設（in_ote 的單較好、EQ 池優於 SWING），
    #   樣本太小未驗證。要驗證：兩者都開再跑 ict-backtest 比較期望值。

grid:                   # 自動網格機器人 (python main.py run-grid)
  auto_range: true      # true = 自動以「現價 ±range_pct」當區間（range_mode=fixed 時）
  range_pct: 0.15       # 固定模式的區間幅度（0.15 = 現價上下各 15%）
  grids: 10             # 網格數量
  quote_per_grid: 5     # 每格買入金額（USDT）。注意：grids × quote_per_grid 要 ≤ 你的餘額
  poll_seconds: 20      # 多久檢查一次價格
  breakout_buffer: 0.02 # 超出區間多少比例才算突破（避免邊緣抖動誤判）
  reset_on_breakout: true   # 突破/跌破區間時自動關閉並重開新網格
  max_loss_quote: 0     # 未實現虧損達此金額(USDT)就關閉重開；0 = 只靠區間判斷

  # ① ATR 動態區間：依市場波動自動決定網格寬稄（市場越瘋格子越寬）
  range_mode: atr       # fixed = 用 range_pct；atr = 用 ATR 動態
  atr_period: 14
  atr_mult: 6           # 半區間 = atr_mult × ATR（越大區間越寬、越不易突破）

  # ② 震盪盤過濾：強趨勢(ADX高)時不開網格，避免在單邊行情一直接刀
  regime_filter: true
  adx_period: 14
  adx_max: 30           # ADX 高於此值(強趨勢)就暫停開網格，等轉震盪再自動開

  indicator_interval: 60M   # ATR/ADX 用的 K 線週期
  indicator_limit: 150

  # range_mode=fixed 且 auto_range=false 時改用固定區間：
  # lower: 50000
  # upper: 70000

dca:                    # 智慧 DCA 定投 (python main.py run-dca)，只買不賣、長期累積
  quote_base: 5         # 每次基本買入金額（USDT）
  interval_hours: 24    # 多久買一次：24=每天，168=每週
  indicator_interval: 1D  # 參考均線用的 K 線週期
  ref_period: 20        # 參考均線期數（如 20 日均線）
  dip_step: 0.05        # 每跌離均線 5%，加碼一檔
  mult_per_step: 0.5    # 每檔多買 0.5 倍
  max_mult: 3.0         # 逆低最多買到基本額的 3 倍
  take_profit_pct: 0    # 帳面獲利達此 % 自動停利（0=關閉；如 0.5=+50% 就賣）
  take_profit_fraction: 1.0  # 停利時賣出比例（1.0=全賣後重新定投；0.5=賣一半續抱）
  poll_seconds: 30

smc:                    # SMC 偵測模組（Smart Money Concepts）參數
  max_bars: 1500        # 每次收盤重算最近幾根（先求對、再求快）
  swing:
    left: 3             # swing 分形左側根數
    right: 3            # 右側根數（右側收盤後才「確認」，防未來函數）
  structure:
    break_mode: close   # close = 收盤突破才算 | wick = 影線碰到就算
    # v1.1 位移門檻：突破要有「位移品質」才算可交易事件（狀態機不受影響）
    displacement_mode: fvg    # atr = 只看實體 | fvg = 推進段含合格 FVG | either
    min_displacement_atr: 0.5 # atr/either 模式：突破 K 實體 ≥ 此倍數 × ATR(14)
    displacement_fvg_min_pct: 0.0015  # fvg/either 模式：推進段合格 FVG 的最小寬度
                              # （獨立於 fvg.min_size_pct——區域偵測維持 0.0005；
                              #  沿用會讓閘門形同虛設，2026-07-14 密度實測校準）
  liquidity:
    eq_tolerance_pct: 0.001   # 等高/等低合併容忍度（0.1%）
    sweep_mode: wick          # wick = 單根收針 | reclaim = 收盤收回
    max_reclaim_bars: 3
  fvg:
    min_size_pct: 0.0005      # 缺口最小寬度（佔現價比例），太小的雜訊不算
  bpr:                        # v1.1 規則（修 v1.0 組合爆炸：10 天 300+ 雜訊細條）
    max_gap_bars: 20          # 兩個反向 FVG 間隔超過此根數不配對
    require_overlap_leg: true # 第二個 FVG 的位移 K 必須實際走完第一個 FVG 區域
    dedup_overlap_pct: 0.5    # 與既有 BPR 重疊比例超過此值 → 只留較新者
    # component_min_pct: 0.0015  # 組件 FVG 最小寬度；預設沿用
    #                            # structure.displacement_fvg_min_pct（同一把尺）
  zones:                      # v1.1 生命週期（plot 與策略共用同一真相）
    max_age_bars: 200         # 區域存活上限（15M ≈ 2 天），逾齡移除
    max_active_per_kind: 8    # 同 kind 活躍區域上限，超過移除最舊
  ob:
    zone: full_range          # full_range = 整根 K | body = 只算實體
  fib:
    ote: [0.62, 0.79]         # OTE 進場帶（0 錨定 range 高點、1 錨定低點）
  sessions:
    tz: "America/New_York"    # IANA 時區，夏冬令自動處理
    asia:    ["20:00", "00:00"]
    london:  ["03:00", "06:00"]
    newyork: ["09:00", "11:00"]
    # 2026-07-14 抽查疑點澄清：NY 帶實測 8 根 15M（=2 小時，正確）；
    # 圖上 12 根（3 小時）的帶是 London（03:00–06:00），非 NY 筆誤

plot:                     # smc-plot 視覺化選項
  show_weak_events: true  # displacement=false 的 BOS/MSS 用淡色小字畫出（除錯用）

backtest:                 # 回測共用設定（頂層區段，不在 strategy 底下）
  slippage_pct: 0.0       # ict-backtest/binance-backtest 的滑價（0.001 = 0.1%）
  # binance_base_url:     # 幣安端點；留空 = 預設 data-api.binance.vision（免地區限制）
                          # 地區限制時可設 https://api-gcp.binance.com 等；勿用 binance.us

webhook:
  host: 0.0.0.0
  port: 8080
  path: /webhook        # 訊號來源 POST 的路徑
  # 共享密鑰從環境變數 WEBHOOK_SECRET 讀取（見 .env）

notify:
  discord:
    enabled: false      # 設 true 後啟用 Discord（推播 + 選配雙向）
    # 推播：在 .env 填 DISCORD_WEBHOOK_URL（頻道設定 → 整合 → 建立 Webhook，最簡單）。
    # 雙向查詢：另在 .env 填 DISCORD_BOT_TOKEN + DISCORD_CHANNEL_ID，就能在頻道
    #   打字查網格狀態（唯讀）。兩者可只設一個，也可都設。
  telegram:
    enabled: false      # 設 true 並在 .env 填 token/chat_id 後啟用
  line:
    enabled: false      # 設 true 並在 .env 填 LINE_CHANNEL_TOKEN/LINE_USER_ID 後啟用
    # 注意：LINE 只推「實際成交」「啟動」「錯誤」與「每日摘要」，避免耗用免費推播額度
  daily_summary:
    enabled: true       # 每天推一次結算
    utc_hour: 12        # 幾點推（UTC 時）。台灣 = UTC+8，所以 12 = 台灣晚上 8 點

logging:
  level: INFO           # DEBUG / INFO / WARNING / ERROR
  file: logs/bot.log
