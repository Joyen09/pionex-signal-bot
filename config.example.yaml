# 派網訊號機器人設定範本。
# 複製為 config.yaml 後修改。機密（API 金鑰）請放在 .env，不要寫在這裡。

# 執行模式：
#   paper = 紙上交易（不下真實單，只模擬與記錄）  <-- 強烈建議先用這個
#   live  = 實盤交易（會用真錢下單）
mode: paper

exchange:
  base_url: https://api.pionex.com
  market: spot          # 目前支援 spot；futures 之後擴充

trading:
  symbol: BTC_USDT      # 交易對，格式為 BASE_QUOTE
  order_type: MARKET    # MARKET 或 LIMIT
  quote_per_trade: 20   # 每次「買入」要花多少報價幣（USDT）
  # LIMIT 單才會用到：掛單價相對市價的偏移百分比（買單往下、賣單往上）
  limit_offset_pct: 0.1

risk:
  max_quote_per_trade: 50      # 單筆買入金額上限（USDT），超過拒絕
  max_position_base: 0.01      # 最多持有的基礎幣數量（BTC），超過不再買
  daily_loss_limit_quote: 50   # 當日已實現虧損達此值（USDT）即停止交易
  cooldown_seconds: 60         # 兩筆交易最短間隔，避免訊號連發
  allow_short: false           # 現貨不可做空；保留給未來合約
  # 停損/停利建議值（順勢策略：留停損當安全網、關掉停利讓獲利奔跑）
  # 真正最佳值請用真實資料跑：python main.py backtest-sweep
  stop_loss_pct: 0.05          # 停損：虧損達 5% 自動平倉（0 = 關閉）
  take_profit_pct: 0           # 停利：關閉，靠策略的死亡交叉出場（0 = 關閉）

strategy:
  # 可用策略：ma_cross / rsi / macd / bollinger
  name: ma_cross
  interval: 5M          # K 線週期：1M 5M 15M 30M 60M 4H 8H 12H 1D
  poll_seconds: 30      # 多久抓一次 K 線重新評估
  params:
    # --- ma_cross ---
    fast: 9             # 快線週期
    slow: 21            # 慢線週期
    trend_ma: 200       # 趨勢過濾：只在站上此長均線(多頭)才做多；0 = 關閉
    # --- rsi（換成 name: rsi 時使用）---
    # period: 14
    # oversold: 30
    # overbought: 70
    # --- macd（換成 name: macd 時使用）---
    # fast: 12
    # slow: 26
    # signal: 9
    # --- bollinger（換成 name: bollinger 時使用）---
    # period: 20
    # num_std: 2.0

grid:                   # 自動網格機器人 (python main.py run-grid)
  auto_range: true      # true = 自動以「現價 ±range_pct」當區間（range_mode=fixed 時）
  range_pct: 0.15       # 固定模式的區間幅度（0.15 = 現價上下各 15%）
  grids: 10             # 網格數量
  quote_per_grid: 5     # 每格買入金額（USDT）。注意：grids × quote_per_grid 要 ≤ 你的餘額
  poll_seconds: 20      # 多久檢查一次價格
  breakout_buffer: 0.02 # 超出區間多少比例才算突破（避免邊緣抖動誤判）
  reset_on_breakout: true   # 突破/跌破區間時自動關閉並重開新網格
  max_loss_quote: 0     # 未實現虧損達此金額(USDT)就關閉重開；0 = 只靠區間判斷

  # ① ATR 動態區間：依市場波動自動決定網格寬窄（市場越瘋格子越寬）
  range_mode: atr       # fixed = 用 range_pct；atr = 用 ATR 動態
  atr_period: 14
  atr_mult: 6           # 半區間 = atr_mult × ATR（越大區間越寬、越不易突破）

  # ② 震盪盤過濾：強趨勢(ADX高)時不開網格，避免在單邊行情一直接刀
  regime_filter: true
  adx_period: 14
  adx_max: 30           # ADX 高於此值(強趨勢)就暫停開網格，等轉震盪再自動開

  indicator_interval: 60M   # ATR/ADX 用的 K 線週期
  indicator_limit: 150

  # range_mode=fixed 且 auto_range=false 時改用固定區間：
  # lower: 50000
  # upper: 70000

dca:                    # 智慧 DCA 定投 (python main.py run-dca)，只買不賣、長期累積
  quote_base: 5         # 每次基本買入金額（USDT）
  interval_hours: 24    # 多久買一次：24=每天，168=每週
  indicator_interval: 1D  # 參考均線用的 K 線週期
  ref_period: 20        # 參考均線期數（如 20 日均線）
  dip_step: 0.05        # 每跌離均線 5%，加碼一檔
  mult_per_step: 0.5    # 每檔多買 0.5 倍
  max_mult: 3.0         # 逢低最多買到基本額的 3 倍
  take_profit_pct: 0    # 帳面獲利達此 % 自動停利（0=關閉；如 0.5=+50% 就賣）
  take_profit_fraction: 1.0  # 停利時賣出比例（1.0=全賣後重新定投；0.5=賣一半續抱）
  poll_seconds: 30

webhook:
  host: 0.0.0.0
  port: 8080
  path: /webhook        # 訊號來源 POST 的路徑
  # 共享密鑰從環境變數 WEBHOOK_SECRET 讀取（見 .env）

notify:
  telegram:
    enabled: false      # 設 true 並在 .env 填 token/chat_id 後啟用
  line:
    enabled: false      # 設 true 並在 .env 填 LINE_CHANNEL_TOKEN/LINE_USER_ID 後啟用
    # 注意：LINE 只推「實際成交」「啟動」「錯誤」與「每日摘要」，避免耗用免費推播額度
  daily_summary:
    enabled: true       # 每天推一次結算
    utc_hour: 12        # 幾點推（UTC 時）。台灣 = UTC+8，所以 12 = 台灣晚上 8 點

logging:
  level: INFO           # DEBUG / INFO / WARNING / ERROR
  file: logs/bot.log
